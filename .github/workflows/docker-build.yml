name: Build and Push Docker Images

on:
  push:
    branches: ['**']
    tags: ['*']
    paths:
      - 'Dockerfile'
      - 'Dockerfile.unified'
      - 'registry/**'
      - 'scripts/**'
      - 'openclaw/**'
      - 'web/**'
      - 'plugins/**'
      - 'config/**'
      - 'models/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'Dockerfile.unified'
      - 'registry/**'
      - 'scripts/**'
      - 'openclaw/**'
      - 'web/**'
      - 'plugins/**'
      - 'config/**'
      - 'models/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  # Unified image - works on all GPUs with tested CUDA architectures
  # Uses pre-built engines from a2go-engines (built by engines-build.yml)
  # Builds per-architecture images (amd64 + arm64) then creates a multi-arch manifest.
  build-unified:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: blacksmith-4vcpu-ubuntu-2404
          - arch: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Set environment variables
        run: |
          echo "DOCKERHUB_REPO=${{ vars.DOCKERHUB_REPO || secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_ENV

          # Determine Docker tag from branch name
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          # main → latest, other branches → sanitized branch name
          if [[ "$BRANCH" == "main" ]]; then
            echo "VERSION=latest" >> $GITHUB_ENV
          else
            # Replace slashes and underscores with hyphens, lowercase, trim leading hyphens
            SANITIZED=$(echo "$BRANCH" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]' | sed 's/^-*//')
            echo "VERSION=$SANITIZED" >> $GITHUB_ENV
          fi

          echo "ALSO_LATEST=false" >> $GITHUB_ENV
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "PUSH_IMAGES=false" >> $GITHUB_ENV
          else
            echo "PUSH_IMAGES=true" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile.unified
          push: ${{ env.PUSH_IMAGES == 'true' }}
          build-args: |
            ENGINES_IMAGE=${{ env.DOCKERHUB_REPO }}/a2go-engines:latest-${{ matrix.arch }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}/a2go:${{ env.VERSION }}-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}

  create-manifest:
    needs: build-unified
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Set environment variables
        run: |
          echo "DOCKERHUB_REPO=${{ vars.DOCKERHUB_REPO || secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_ENV

          # Determine Docker tag from branch name (must match build job logic)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          if [[ "$BRANCH" == "main" ]]; then
            echo "VERSION=latest" >> $GITHUB_ENV
          else
            SANITIZED=$(echo "$BRANCH" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]' | sed 's/^-*//')
            echo "VERSION=$SANITIZED" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t \
            ${{ env.DOCKERHUB_REPO }}/a2go:${{ env.VERSION }} \
            ${{ env.DOCKERHUB_REPO }}/a2go:${{ env.VERSION }}-amd64 \
            ${{ env.DOCKERHUB_REPO }}/a2go:${{ env.VERSION }}-arm64
