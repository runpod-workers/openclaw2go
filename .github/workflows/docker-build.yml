  # Disabled - replaced by unified image
  build-glm47-flash-gguf-llamacpp:
    if: false
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Blacksmith Builder
