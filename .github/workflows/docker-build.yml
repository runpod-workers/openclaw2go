name: Build and Push Docker Images

on:
  push:
    branches: [main, feat/site-improvements]
    tags: ['*']
  pull_request:
    paths:
      - 'models/**'
      - 'Dockerfile'
      - 'Dockerfile.unified'
      - 'registry/**'
      - 'scripts/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  # Temporarily disabled - only building NVFP4 5090 image
  build-glm47-flash-awq-4bit:
    if: false
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Set environment variables
        run: |
          echo "DOCKERHUB_REPO=${{ vars.DOCKERHUB_REPO || secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_ENV
          echo "VERSION=latest" >> $GITHUB_ENV
          echo "ALSO_LATEST=false" >> $GITHUB_ENV
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "PUSH_IMAGES=false" >> $GITHUB_ENV
          else
            echo "PUSH_IMAGES=true" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: models/glm47-flash-awq-4bit/Dockerfile
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}/a2go-glm4.7-flash-awq-4bit:${{ env.VERSION }}
            ${{ env.ALSO_LATEST == 'true' && format('{0}/a2go-glm4.7-flash-awq-4bit:latest', env.DOCKERHUB_REPO) || '' }}
          platforms: linux/amd64

  # Disabled - vLLM NVFP4 has bugs with GLM-4.7 MLA on Blackwell
