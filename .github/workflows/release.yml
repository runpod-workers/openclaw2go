name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When no pending changesets (version PR was just merged), check if we need a release
      - id: check
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" = "0.0.0" ]; then
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.should-build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes

  build-cli:
    needs: release
    if: needs.release.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: a2go_linux_amd64
          - goos: linux
            goarch: arm64
            asset: a2go_linux_arm64
          - goos: darwin
            goarch: arm64
            asset: a2go_darwin_arm64
          - goos: windows
            goarch: amd64
            asset: a2go_windows_amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: a2go/go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd a2go
          go build \
            -ldflags "-s -w -X github.com/runpod-labs/a2go/a2go/cmd.Version=v${{ needs.release.outputs.version }}" \
            -o "../${{ matrix.asset }}" .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" \
            "${{ matrix.asset }}" \
            --clobber
