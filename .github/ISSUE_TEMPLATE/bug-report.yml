name: Bug Report
description: Report a bug in agent2go
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thanks for taking the time to report a bug. Please fill out the details below
        so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear description of what the bug is."
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "How can we reproduce this?"
      placeholder: |
        1. Set A2GO_CONFIG to '...'
        2. Start the pod
        3. Run '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true

  - type: dropdown
    id: gpu
    attributes:
      label: GPU
      options:
        - RTX 5090 (32 GB)
        - RTX 4090 (24 GB)
        - L40 (48 GB)
        - A100 80GB
        - H100 80GB
        - B200 180GB
        - Other (specify in logs/notes)
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: A2GO_CONFIG
      description: "Paste your A2GO_CONFIG value"
      render: json
      placeholder: '{"llm": "unsloth/glm47-flash-gguf", "audio": "liquidai/lfm25-audio"}'

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs. Include output from `nvidia-smi`, container logs,
        or error messages.
      render: text
