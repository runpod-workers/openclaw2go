name: Feature Request
description: Suggest a new feature or improvement for agent2go
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Describe the feature you'd like to see in agent2go.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear description of the feature or improvement."
      placeholder: "What would you like to see?"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: "Why is this feature useful? What problem does it solve?"
      placeholder: "I want this because..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: "If you have an idea of how this could be implemented, describe it here."
      placeholder: "One way to do this would be..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Any alternative approaches you've thought about."
